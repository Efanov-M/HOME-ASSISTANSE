<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task details Home Secretary</title>
</head>

<body>
    <header>
        <h1>Task details</h1>
    </header>

    <main>
        <section>
            <h2 id="task-title">Loading task title...</h2>

            <p>
                <strong>Description:</strong>
                <span id="task-description">Loading description...</span>
            </p>

            <p>
                <strong>Status:</strong>
                <span id="task-status">Loading status...</span>
            </p>

            <p>
                <strong>Task type:</strong>
                <span id="task-type">Loading task type...</span>
            </p>

            <p>
                <strong>Due date:</strong>
                <span id="task-due-date">Loading due date...</span>
            </p>

            <p>
                <strong>Created by:</strong>
                <span id="task-created-by">Loading creator...</span>
            </p>

            <p>
                <strong>Assigned to:</strong>
                <span id="task-assigned-to">Loading assignee...</span>
            </p>
        </section>

        <section>
            <button type="button" id="edit-task-button">Edit</button>
            <button type="button" id="delete-task-button">Delete</button>
            <a href="./tasks.html">Back to tasks</a>
        </section>
    </main>

    <footer>
    </footer>

    <script src="../static/js/task-detail.js"></script>
</body>

</html>
